name: minsk_transport
description: Cross-platform adaptive Flutter app for PMVS Lab 9 Task 4
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  intl: ^0.20.2

  flutter_riverpod: ^2.5.1
  go_router: ^14.2.0
  shared_preferences: ^2.2.3

  sqflite: ^2.3.3+1
  path: ^1.9.0

  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

  integration_test:
    sdk: flutter
  shared_preferences_platform_interface: ^2.4.1

flutter:
  uses-material-design: true
  generate: true