name: Task1 Weather CI

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/task1.yml"
      - "Task1-WeatherApplication/**"
  pull_request:
    paths:
      - ".github/workflows/task1.yml"
      - "Task1-WeatherApplication/**"

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Task1-WeatherApplication
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Prepare Android local.properties
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          echo "ANDROID_HOME=$ANDROID_SDK_ROOT" >> "$GITHUB_ENV"
      - name: Build Android
        run: bash ./gradlew :app:assembleDebug --stacktrace

  desktop:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Task1-WeatherApplication
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Build Desktop
        run: bash ./gradlew :app:desktopJar --stacktrace

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Task1-WeatherApplication
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Build Web
        run: bash ./gradlew :app:jsBrowserDistribution --stacktrace

  ios:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: Task1-WeatherApplication
    steps:
      - uses: actions/checkout@v4
      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle
      - name: Build iOS
        run: bash ./gradlew :app:iosArm64Binaries --stacktrace